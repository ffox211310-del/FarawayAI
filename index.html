<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faraway Test6</title>

<style>
body{
    background:#111;
    color:white;
    font-family:sans-serif;
    padding:20px;
}
#chat{
    border:1px solid #444;
    height:300px;
    overflow-y:auto;
    padding:10px;
    margin-bottom:10px;
}
input{
    width:70%;
    padding:10px;
}
button{
    padding:10px;
}
</style>
</head>
<body>

<h2>Faraway AI Test</h2>

<div id="status">モデル未読込</div>

<div id="chat"></div>

<input id="prompt" placeholder="メッセージ">
<button id="send">送信</button>

<script type="module">

    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    console.log(
  webllm.prebuiltAppConfig?.model_list
);
    console.log("webllm=", webllm);
console.log("keys=", Object.keys(webllm));
    
const status = document.getElementById("status");
const chat = document.getElementById("chat");

status.textContent = "モデル読み込み中...";

const engine = await webllm.CreateMLCEngine(
  "Qwen2.5-1.5B-Instruct-q4f16_1"
);

status.textContent = "準備完了";

document.getElementById("send").onclick = async () => {

    const text =
        document.getElementById("prompt").value;

    if(!text) return;

    chat.innerHTML += `<p><b>あなた:</b> ${text}</p>`;

    const response =
        await engine.chat.completions.create({
            messages:[
                {
                    role:"user",
                    content:text
                }
            ]
        });

    const reply =
        response.choices[0].message.content;

    chat.innerHTML += `<p><b>Faraway:</b> ${reply}</p>`;

    chat.scrollTop = chat.scrollHeight;
};

</script>

</body>
</html>
