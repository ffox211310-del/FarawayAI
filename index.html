<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Faraway</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<div class="app">

<header class="header">

<div class="logo">
FARAWAY
</div>

<div class="ship-status">
<div class="dot"></div>
通信船停泊中
</div>

</header>

<div class="chat">

<div class="system">
Farawayが通信船で到着しています
</div>

<div class="msg ai">
<div class="sender">🚀 FARAWAY</div>

こんにちは。

遠くから来ました。
</div>

<div class="msg ai">
<div class="sender">🚀 FARAWAY</div>

たとえ砂漠の真ん中でも。

宇宙の果てでも。

スマホが動く限り、
あなたのそばにいます。
</div>

<div class="msg user">
<div class="sender">👤 YOU</div>

よろしく。
</div>

<div class="msg ai">
<div class="sender">🚀 FARAWAY</div>

歓迎ありがとうございます。

これからよろしくお願いします。
</div>

</div>

<div class="input-wrap">

<div class="input-area">

<input
class="input-box"
placeholder="Farawayへメッセージを送信..."
>

<button class="send-btn">
➤
</button>

</div>

</div>

</div>
<script src="app.js"></script>
</body>
</html>
