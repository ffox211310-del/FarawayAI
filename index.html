<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gemma WebLLM Chat</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        textarea { width: 100%; height: 300px; margin-bottom: 10px; }
        input { width: 80%; padding: 8px; }
        button { padding: 8px 16px; }
        .status { margin-bottom: 10px; color: #666; }
    </style>
</head>
<body>
    <h2>Gemma WebLLM チャット (完全オフライン)</h2>
    <div class="status" id="status">モデルを読み込み中... (初回は時間がかかります)</div>
    <textarea id="output" readonly placeholder="会話がここに表示されます"></textarea>
    <div>
        <input type="text" id="input" placeholder="メッセージを入力...">
        <button id="send">送信</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm"
            }
        }
    </script>
    <script type="module">
        import { CreateMLCEngine } from "@mlc-ai/web-llm";

        const output = document.getElementById('output');
        const inputField = document.getElementById('input');
        const sendButton = document.getElementById('send');
        const statusDiv = document.getElementById('status');
        
        let engine;
        
        async function initEngine() {
            statusDiv.textContent = "モデルをダウンロード中... (初回は時間がかかります)";
            // Gemma 2 2B モデルを指定
            engine = await CreateMLCEngine("Gemma-2-2b-it-q4f32_1-MLC");
            statusDiv.textContent = "準備完了！ メッセージを入力してください";
            output.value = "チャットボットの準備ができました！\n";
        }
        
        async function generateResponse() {
            const userInput = inputField.value.trim();
            if (!userInput) return;
            
            output.value += `\n> あなた: ${userInput}`;
            inputField.value = '';
            statusDiv.textContent = "応答を生成中...";
            
            const response = await engine.chat.completions.create({
                messages: [{ role: "user", content: userInput }],
            });
            
            const reply = response.choices[0].message.content;
            output.value += `\n🤖 AI: ${reply}\n`;
            output.scrollTop = output.scrollHeight;
            statusDiv.textContent = "準備完了";
        }
        
        sendButton.addEventListener('click', generateResponse);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateResponse();
        });
        
        initEngine();
    </script>
</body>
</html>
