<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT-2 会話チャット（オフライン）</title>
  <style>
    body { font-family: sans-serif; max-width: 100%; margin: 1em; }
    #status { padding: 0.8em; border-radius: 6px; background: #e0f0ff; margin-bottom: 0.5em; }
    #error { padding: 0.8em; background: #ffe0e0; color: #b00020; display: none; white-space: pre-wrap; border-radius: 6px; }
    #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 0.8em; margin-bottom: 0.5em; background: #fafafa; }
    .message { margin-bottom: 0.5em; }
    .user { color: #1a73e8; }
    .bot { color: #202124; }
    .bot.thinking { color: #888; font-style: italic; }
    #input-area { display: flex; gap: 0.3em; }
    #prompt { flex: 1; padding: 0.5em; font-size: 16px; } /* スマホでズームされないサイズ */
    button { padding: 0.5em 1em; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h3>🤖 GPT-2 オフラインチャット</h3>
  <div id="status">モデル未ロード</div>
  <div id="error"></div>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="prompt" placeholder="メッセージを入力" disabled />
    <button id="sendBtn" disabled>送信</button>
  </div>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    // 動作確認済みの GPT-2（約500MB、一度ダウンロードすればオフライン可）
    const MODEL_NAME = 'Xenova/gpt2';

    const statusDiv = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    const chatDiv = document.getElementById('chat');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');

    let generator = null;

    // 会話風のプロンプトを作成する
    function buildConversationPrompt(userMessage) {
      return `The following is a conversation between a user and a helpful AI assistant.

User: Hello!
Assistant: Hi there! How can I assist you today?
User: ${userMessage}
Assistant:`;
    }

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    async function loadModel() {
      statusDiv.textContent = 'モデルをダウンロード中... (初回のみ、以降オフライン)';
      try {
        generator = await pipeline('text-generation', MODEL_NAME);
        statusDiv.textContent = '✅ 準備完了！ 話しかけてみてください';
        promptInput.disabled = false;
        sendBtn.disabled = false;
        addMessage('🤖', 'こんにちは！オフラインで会話できます。');
      } catch (err) {
        showError('モデル読み込み失敗: ' + err.message);
        statusDiv.textContent = '❌ エラー';
      }
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'message ' + (role === 'あなた' ? 'user' : 'bot');
      div.textContent = (role === 'あなた' ? '🧑 ' : '🤖 ') + text;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
      const userMessage = promptInput.value.trim();
      if (!userMessage || !generator) return;

      addMessage('あなた', userMessage);
      promptInput.value = '';
      sendBtn.disabled = true;
      promptInput.disabled = true;

      // 考え中表示
      const thinkDiv = document.createElement('div');
      thinkDiv.className = 'message bot thinking';
      thinkDiv.textContent = '🤖 考え中...';
      chatDiv.appendChild(thinkDiv);

      try {
        const promptText = buildConversationPrompt(userMessage);
        const result = await generator(promptText, {
          max_new_tokens: 100,
          temperature: 0.8,
          do_sample: true,
          top_k: 50,
          top_p: 0.95,
        });

        const fullText = result[0].generated_text;
        // プロンプト部分を取り除き、最初の改行までを返答とする（余計な続きをカット）
        let reply = fullText.slice(promptText.length).split('\n')[0].trim();
        if (!reply) reply = '(無言)';

        thinkDiv.remove();
        addMessage('🤖', reply);
      } catch (err) {
        thinkDiv?.remove();
        showError('生成エラー: ' + err.message);
        addMessage('🤖', '⚠️ エラーが発生しました');
      } finally {
        sendBtn.disabled = false;
        promptInput.disabled = false;
        promptInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });

    loadModel();
  </script>
</body>
</html>
