<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Faraway</title>

<style>

:root{
--bg:#000;
--panel:#081321;
--panel2:#0d1f34;
--blue:#4da3ff;
--cyan:#78e7ff;
--text:#eef9ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:sans-serif;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:14px;
border-bottom:1px solid #173252;
background:var(--panel);
font-weight:bold;
}

#status{
font-size:12px;
color:var(--cyan);
margin-top:4px;
}

#chat{
flex:1;
overflow-y:auto;
padding:12px;
}

.msg{
padding:10px 12px;
margin-bottom:10px;
border-radius:12px;
white-space:pre-wrap;
}

.user{
background:#14304d;
margin-left:20%;
}

.ai{
background:#09192b;
margin-right:20%;
}

footer{
display:flex;
gap:8px;
padding:10px;
background:var(--panel);
border-top:1px solid #173252;
}

input{
flex:1;
padding:12px;
background:var(--panel2);
border:1px solid #173252;
color:white;
border-radius:10px;
}

button{
padding:12px 16px;
border:none;
border-radius:10px;
background:var(--blue);
color:white;
font-weight:bold;
}

</style>
</head>
<body>

<header>
Faraway
<div id="status">モデル読み込み中...</div>
</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="メッセージ">
<button id="send">送信</button>
</footer>

<script type="module">

import {
pipeline
}
from "https://cdn.jsdelivr.net/npm/@huggingface/transformers";

const MODEL =
"Qwen/Qwen2.5-0.5B-Instruct";

const status =
document.getElementById("status");

const chat =
document.getElementById("chat");

const input =
document.getElementById("input");

const send =
document.getElementById("send");

let generator;
      /*システムプロンプト*/
  const SYSTEM_PROMPT = `
あなたはFarawayAIです。

特徴:
・タメ口
•日本語で話す
・分からないことは分からないと言う
・長すぎる文章は避ける
`;
/*会話履歴*/
  const history = [];

function add(text,type){

const div =
document.createElement("div");

div.className =
"msg " + type;

div.textContent =
text;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;
}

status.textContent =
"モデルダウンロード中...";

generator =
await pipeline(
"text-generation",
MODEL
);

status.textContent =
"準備完了";

async function ask(){

const text = input.value.trim();

if(!text) return;

add(text,"user");

input.value="";

history.push(
`ユーザー: ${text}`
);

const thinking =
document.createElement("div");

thinking.className="msg ai";
thinking.textContent="考え中...";

chat.appendChild(thinking);

const prompt = `
${SYSTEM_PROMPT}

${history.join("\n")}

Faraway:
`;

const result = await generator(
prompt,
{
max_new_tokens:80,
temperature:0.7
}
);

const generated =
result[0].generated_text;

let answer =
generated.replace(prompt,"").trim();

if(!answer){
answer = "・・・";
}

thinking.textContent = answer;

history.push(
`Faraway: ${answer}`
);

}

send.onclick = ask;

input.addEventListener(
"keydown",
e=>{
if(e.key==="Enter"){
ask();
}
});


</script>

</body>
</html>
