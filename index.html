<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Faraway AI</title>
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/00ffff/000000?text=F">
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050510;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height:100vh;
    height:100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Background Animation */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }

        /* UI Elements */
        header {
            padding: 40px 20px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(5,5,16,0.8), transparent);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
    padding-bottom:120px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
            mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            backdrop-filter: blur(10px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-bottom-left-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .system-status {
            text-align: center;
            font-size: 10px;
            color: var(--primary);
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px 0;
        }

        footer {
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(5,5,16,0.8), transparent);
            backdrop-filter: blur(10px);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.9);
        }

        /* Loading Indicator */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 5px;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Scrollbar */
        #chat-container::-webkit-scrollbar {
            width: 4px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <h1>Faraway</h1>
        <div id="status" class="system-status">Initializing Neural Core...</div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            Welcome to Faraway. I am your high-performance neural companion. How shall we begin?
        </div>
    </div>

    <footer>
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Transmit message..." autocomplete="off">
        </div>
        <button id="send-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </footer>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // --- Background Animation ---
        let particles = [];
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: Math.random() * 0.5 - 0.25,
                    speedY: Math.random() * 0.5 - 0.25,
                    color: Math.random() > 0.5 ? '#00f2ff' : '#7000ff'
                });
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                
                // Draw lines
                particles.forEach(p2 => {
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 100) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - dist/100})`;
                        ctx.lineWidth = 0.2;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        animate();

        // --- WebLLM Core ---
        // 高性能な Llama-3.1-8B を選択（iPhoneハイエンド向け）
        // 重すぎる場合は Qwen2.5-1.5B や Phi-3.5-mini に切り替え可能
        const selectedModel = "Qwen2.5-3B-Instruct-q4f16_1-MLC"; 
        
        const engine = new webllm.MLCEngine();

        async function initAI() {
            try {
                statusEl.textContent = "Syncing with Neural Grid...";
                
                engine.setInitProgressCallback((report) => {
                    statusEl.textContent = report.text;
                });

                await engine.reload(selectedModel);
                await new Promise(resolve =>
    setTimeout(resolve, 1000)
);
                statusEl.textContent = "System Online | High-Perf Mode";
            } catch (err) {
                console.error(err);
                statusEl.textContent = "Error: Falling back to Lite Model...";
                // フォールバック
                await engine.reload("Qwen2.5-1.5B-Instruct-q4f16_1-MLC");
                statusEl.textContent = "System Online | Lite Mode";
            }
        }

        initAI();

        // --- Chat Logic ---
        const messages = [
            { role: "system", content: "You are Faraway, a sophisticated and futuristic AI assistant. You speak with a sense of intelligence and elegance. You are helpful, concise when needed, but deeply conversational. You aim to provide high-quality responses optimized for a high-end mobile experience." }
        ];

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || statusEl.textContent.includes('Loading')) return;

            // User message
            appendMessage('user', text);
            messages.push({ role: "user", content: text });
            userInput.value = '';

            // AI message placeholder
            const aiMsgDiv = appendMessage('ai', '');
            const loadingDots = document.createElement('div');
            loadingDots.className = 'loading-dots';
            loadingDots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            aiMsgDiv.appendChild(loadingDots);

            try {
const chunks = await engine.chat.completions.create({
    messages,
    stream: true,
});
                let fullReply = "";
                aiMsgDiv.innerHTML = ""; // Remove loading dots

                for await (const chunk of chunks) {
                    const content = chunk.choices[0]?.delta.content || "";
                    fullReply += content;
                    aiMsgDiv.textContent = fullReply;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                messages.push({ role: "assistant", content: fullReply });
            } catch (err) {
    console.error(err);

    aiMsgDiv.textContent =
        err?.message ||
        String(err) ||
        "Unknown Error";
}
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // PWA Offline Support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker Registered', reg))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
        /*スクロール*/
        userInput.addEventListener('focus', () => {
    setTimeout(() => {
        userInput.scrollIntoView({
            behavior: "smooth",
            block: "center"
        });
    }, 300);
});
    </script>
</body>
</html>
