<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Faraway</title>

<style>

:root{
--bg:#020611;
--panel:#081321;
--panel2:#10253f;

--blue:#4da3ff;
--cyan:#78e7ff;

--text:#eef9ff;
--sub:#86a4c7;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

background:
radial-gradient(
circle at top,
rgba(77,163,255,.12),
transparent 35%
),
linear-gradient(
180deg,
#081321 0%,
#04070f 55%,
#000 100%
);

color:white;
overflow:hidden;
}

.app{
height:100dvh;
display:flex;
flex-direction:column;
}

/* 星空 */

.stars{
position:fixed;
inset:0;
pointer-events:none;
opacity:.35;
}

.stars::before{

content:"";

position:absolute;
inset:0;

background-image:
radial-gradient(circle,#fff 1px,transparent 1px),
radial-gradient(circle,#78e7ff 1px,transparent 1px);

background-size:
180px 180px,
250px 250px;

background-position:
0 0,
100px 120px;
}

/* ヘッダー */

.header{

padding:18px 20px;

border-bottom:
1px solid rgba(255,255,255,.05);

backdrop-filter:blur(8px);
}

.logo{

font-size:32px;
font-weight:900;
letter-spacing:5px;

background:
linear-gradient(
90deg,
#4da3ff,
#78e7ff,
#ffffff
);

-webkit-background-clip:text;
background-clip:text;
color:transparent;
}

.subtitle{

margin-top:6px;

font-size:13px;

color:var(--cyan);
}

/* チャット */

.chat{

flex:1;

overflow-y:auto;

padding:20px;

display:flex;
flex-direction:column;

gap:14px;
}

.system{

text-align:center;

font-size:12px;

color:var(--sub);

margin-bottom:10px;
}

.msg{

max-width:85%;

padding:14px 16px;

border-radius:18px;

line-height:1.7;

word-break:break-word;
}

.ai{

align-self:flex-start;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(77,163,255,.12);

backdrop-filter:blur(8px);
}

.user{

align-self:flex-end;

background:
linear-gradient(
135deg,
rgba(77,163,255,.65),
rgba(77,163,255,.25)
);
}

.sender{

font-size:11px;

margin-bottom:6px;

color:var(--cyan);

letter-spacing:1px;
}

/* 入力エリア */

.input-wrap{

padding:
0 12px
calc(env(safe-area-inset-bottom) + 12px)
12px;
}

.input-area{

display:flex;
gap:10px;

padding:10px;

border-radius:22px;

background:
rgba(8,19,33,.95);

border:
1px solid rgba(77,163,255,.15);

backdrop-filter:blur(12px);

box-shadow:
0 0 25px rgba(77,163,255,.08);
}

.input-box{

flex:1;

background:none;
border:none;
outline:none;

color:white;

font-size:15px;

padding:12px;
}

.input-box::placeholder{
color:#6d88aa;
}

.send-btn{

width:52px;
height:52px;

border:none;

border-radius:16px;

cursor:pointer;

font-size:20px;

color:white;

background:
linear-gradient(
135deg,
var(--blue),
var(--cyan)
);

box-shadow:
0 0 18px rgba(77,163,255,.25);
}

/* 通信船ステータス */

.ship-status{

display:flex;
align-items:center;
gap:8px;

font-size:12px;
color:var(--cyan);

margin-top:6px;
}

.dot{

width:8px;
height:8px;

border-radius:50%;

background:var(--cyan);

box-shadow:
0 0 10px var(--cyan);
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="app">

<header class="header">

<div class="logo">
FARAWAY
</div>

<div class="ship-status">
<div class="dot"></div>
通信船停泊中
</div>

</header>

<div class="chat">

<div class="system">
Farawayが通信船で到着しています
</div>

<div class="msg ai">
<div class="sender">🚀 FARAWAY</div>

こんにちは。

遠くから来ました。
</div>

<div class="msg ai">
<div class="sender">🚀 FARAWAY</div>

たとえ砂漠の真ん中でも。

宇宙の果てでも。

スマホが動く限り、
あなたのそばにいます。
</div>

<div class="msg user">
<div class="sender">👤 YOU</div>

よろしく。
</div>

<div class="msg ai">
<div class="sender">🚀 FARAWAY</div>

歓迎ありがとうございます。

通信船の準備は完了しています。
</div>

</div>

<div class="input-wrap">

<div class="input-area">

<input
class="input-box"
placeholder="Farawayへメッセージを送信..."
>

<button class="send-btn">
➤
</button>

</div>

</div>

</div>

</body>
</html>
