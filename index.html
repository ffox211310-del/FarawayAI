<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GPT-2 動作確認</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2em auto; padding: 0 1em; }
    #status, #error { padding: 0.8em; border-radius: 6px; margin: 1em 0; }
    #status { background: #e0f0ff; }
    #error { background: #ffe0e0; color: #b00020; display: none; }
    #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 0.8em; margin-bottom: 1em; background: #fafafa; }
    .user { color: #1a73e8; } .bot { color: #202124; }
    #input-area { display: flex; gap: 0.5em; }
    #prompt { flex: 1; padding: 0.5em; }
    button { padding: 0.5em 1.2em; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🔧 GPT-2 動作テスト</h1>
  <div id="status">モデル未ロード</div>
  <div id="error"></div>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="prompt" placeholder="英語で入力してください (Hello など)" disabled />
    <button id="sendBtn" disabled>送信</button>
  </div>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    const MODEL_NAME = 'Xenova/gpt2';  // 絶対に動く

    const statusDiv = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    const chatDiv = document.getElementById('chat');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');

    let generator = null;

    async function loadModel() {
      statusDiv.textContent = 'モデルをダウンロード中... (初回のみ)';
      try {
        generator = await pipeline('text-generation', MODEL_NAME);
        statusDiv.textContent = '✅ 準備完了！ 英語で話しかけてください';
        promptInput.disabled = false;
        sendBtn.disabled = false;
      } catch (err) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'エラー: ' + err.message;
      }
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = role === 'あなた' ? 'user' : 'bot';
      div.textContent = (role === 'あなた' ? '🧑 ' : '🤖 ') + text;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function sendMessage() {
      const prompt = promptInput.value.trim();
      if (!prompt || !generator) return;
      addMessage('あなた', prompt);
      promptInput.value = '';
      sendBtn.disabled = true;
      try {
        const result = await generator(prompt, { max_new_tokens: 50, temperature: 0.7 });
        const reply = result[0].generated_text.replace(prompt, '').trim() || '(空)';
        addMessage('🤖', reply);
      } catch (err) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = '生成エラー: ' + err.message;
      } finally {
        sendBtn.disabled = false;
        promptInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });

    loadModel();
  </script>
</body>
</html>
