<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Llama 3.2 完全手動 (split回避)</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2em auto; padding: 0 1em; }
    #status, #error { margin: 1em 0; padding: 0.8em; border-radius: 6px; }
    #status { background: #e0f0ff; }
    #error { background: #ffe0e0; color: #b00020; display: none; white-space: pre-wrap; }
    #progress-container { width: 100%; background: #ddd; border-radius: 10px; margin: 1em 0; display: none; }
    #progress-bar { height: 20px; width: 0%; background: #4caf50; border-radius: 10px; text-align: center; color: white; line-height: 20px; }
    #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 0.8em; margin-bottom: 1em; background: #fafafa; }
    .message { margin-bottom: 0.6em; }
    .user { color: #1a73e8; }
    .bot { color: #202124; }
    .bot.thinking { color: #888; font-style: italic; }
    #input-area { display: flex; gap: 0.5em; }
    #prompt { flex: 1; padding: 0.5em; font-size: 1em; }
    button { padding: 0.5em 1.2em; font-size: 1em; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🦙 Llama 3.2 (完全手動)</h1>
  <div id="status">モデル未ロード</div>
  <div id="error"></div>
  <div id="progress-container">
    <div id="progress-bar">0%</div>
  </div>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="prompt" placeholder="メッセージを入力" disabled />
    <button id="sendBtn" disabled>送信</button>
  </div>

  <script type="module">
    import { AutoTokenizer, AutoModelForCausalLM } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    const MODEL_NAME = 'Xenova/Llama-3.2-1B-Instruct';

    const statusDiv = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const chatDiv = document.getElementById('chat');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');

    let tokenizer = null;
    let model = null;

    function showError(msg) { errorDiv.textContent = msg; errorDiv.style.display = 'block'; }
    function hideError() { errorDiv.style.display = 'none'; }
    function setStatus(text, progress = null) {
      statusDiv.textContent = text;
      if (progress !== null) {
        progressContainer.style.display = 'block';
        progressBar.style.width = Math.round(progress) + '%';
        progressBar.textContent = Math.round(progress) + '%';
      } else progressContainer.style.display = 'none';
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'message ' + (role === 'あなた' ? 'user' : 'bot');
      div.textContent = (role === 'あなた' ? '🧑 ' : '🤖 ') + text;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    async function loadModel() {
      hideError();
      setStatus('モデルをダウンロード中... (初回のみ)', 0);
      promptInput.disabled = true;
      sendBtn.disabled = true;
      try {
        tokenizer = await AutoTokenizer.from_pretrained(MODEL_NAME, {
          progress_callback: (info) => {
            if (info.status === 'progress') setStatus(`Tokenizer: ${info.file}`, (info.loaded / info.total) * 100);
          }
        });
        model = await AutoModelForCausalLM.from_pretrained(MODEL_NAME, {
          progress_callback: (info) => {
            if (info.status === 'progress') setStatus(`Model: ${info.file}`, (info.loaded / info.total) * 100);
          }
        });
        setStatus('✅ 準備完了！ チャットを始めましょう');
        promptInput.disabled = false;
        sendBtn.disabled = false;
        addMessage('🤖', 'こんにちは！オフラインで動く Llama 3.2 です。');
      } catch (err) {
        showError('モデル読み込みエラー: ' + err.message);
        setStatus('❌ 読み込み失敗');
      }
    }

    function formatPrompt(userMessage) {
      return `<|begin_of_text|><|start_header_id|>user<|end_header_id|>\n\n${userMessage}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`;
    }

    async function sendMessage() {
      const userMessage = promptInput.value.trim();
      if (!userMessage || !model || !tokenizer) return;
      addMessage('あなた', userMessage);
      promptInput.value = '';
      sendBtn.disabled = true;
      promptInput.disabled = true;
      const thinkDiv = document.createElement('div');
      thinkDiv.className = 'message bot thinking';
      thinkDiv.id = 'thinking';
      thinkDiv.textContent = '🤖 考え中...';
      chatDiv.appendChild(thinkDiv);
      chatDiv.scrollTop = chatDiv.scrollHeight;
      hideError();
      try {
        const inputText = formatPrompt(userMessage);
        const { input_ids } = await tokenizer(inputText, { return_tensor: false });
        const output = await model.generate({
          inputs: input_ids,
          max_new_tokens: 256,
          temperature: 0.7,
          do_sample: true,
          eos_token_id: tokenizer.eos_token_id,
          pad_token_id: tokenizer.eos_token_id,
        });
        const generatedTokens = Array.isArray(output) ? output.flat() : output.tolist ? output.tolist()[0] : output;
        const fullText = tokenizer.decode(generatedTokens, { skip_special_tokens: false });
        const reply = fullText.slice(fullText.indexOf(inputText) + inputText.length).replace(/<\|.*?\|>/g, '').trim() || '(応答が空でした)';
        document.getElementById('thinking')?.remove();
        addMessage('🤖', reply);
      } catch (err) {
        document.getElementById('thinking')?.remove();
        console.error(err);
        showError('生成エラー: ' + err.message);
        addMessage('🤖', '⚠️ エラーが発生しました');
      } finally {
        sendBtn.disabled = false;
        promptInput.disabled = false;
        promptInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    loadModel();
  </script>
</body>
</html>
