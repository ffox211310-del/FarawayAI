<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek オフライン Web チャット（改改）</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2em auto; padding: 0 1em; }
    #status, #error { margin: 1em 0; padding: 0.8em; border-radius: 6px; }
    #status { background: #e0f0ff; }
    #error { background: #ffe0e0; color: #b00020; display: none; white-space: pre-wrap; }
    #progress-container { width: 100%; background: #ddd; border-radius: 10px; margin: 1em 0; display: none; }
    #progress-bar { height: 20px; width: 0%; background: #4caf50; border-radius: 10px; text-align: center; color: white; line-height: 20px; }
    #chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 0.8em; margin-bottom: 1em; background: #fafafa; }
    .message { margin-bottom: 0.6em; }
    .user { color: #1a73e8; }
    .bot { color: #202124; }
    .bot.thinking { color: #888; font-style: italic; }
    #input-area { display: flex; gap: 0.5em; }
    #prompt { flex: 1; padding: 0.5em; font-size: 1em; }
    button { padding: 0.5em 1.2em; font-size: 1em; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🧠 DeepSeek オフライン チャット改</h1>
  <div id="status">モデル未ロード</div>
  <div id="error"></div>
  <div id="progress-container">
    <div id="progress-bar">0%</div>
  </div>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="prompt" placeholder="メッセージを入力" disabled />
    <button id="sendBtn" disabled>送信</button>
  </div>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

    // 使用モデル
    const MODEL_NAME = 'onnx-community/DeepSeek-R1-Distill-Qwen-1.5B-ONNX';

    // DOM要素
    const statusDiv = document.getElementById('status');
    const errorDiv = document.getElementById('error');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const chatDiv = document.getElementById('chat');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');

    let generator = null;
    let loading = false;

    function showError(message) {
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
    }
    function hideError() {
      errorDiv.style.display = 'none';
    }

    function setStatus(text, progress = null) {
      statusDiv.textContent = text;
      if (progress !== null) {
        progressContainer.style.display = 'block';
        const pct = Math.round(progress);
        progressBar.style.width = pct + '%';
        progressBar.textContent = pct + '%';
      } else {
        progressContainer.style.display = 'none';
      }
    }

    async function loadModel() {
      if (loading) return;
      loading = true;
      hideError();
      setStatus('モデルをダウンロード中... (初回は時間がかかります)', 0);
      sendBtn.disabled = true;
      promptInput.disabled = true;

      try {
        generator = await pipeline(
          'text-generation',
          MODEL_NAME,
          {
            progress_callback: (progress) => {
              if (progress.status === 'progress') {
                const percent = (progress.loaded / progress.total) * 100;
                setStatus(`モデルダウンロード中... ${progress.file}`, percent);
              } else if (progress.status === 'done') {
                setStatus('モデルファイルを処理中...');
              }
            }
          }
        );
        setStatus('✅ モデルの準備完了！ チャットを始めてください');
        promptInput.disabled = false;
        sendBtn.disabled = false;
        addMessage('🤖', 'こんにちは！オフラインでも使える DeepSeek です。');
      } catch (err) {
        console.error(err);
        let msg = 'モデルの読み込みに失敗しました。\n';
        if (err.message.includes('Failed to fetch')) {
          msg += 'インターネット接続を確認してください。初回ダウンロードが必要です。';
        } else if (err.message.includes('local model')) {
          msg += 'ローカルモデルが見つかりません。パスを確認してください。';
        } else if (err.message.includes('storage') || err.message.includes('quota')) {
          msg += 'ブラウザのストレージ容量が不足しています。キャッシュをクリアするか、より小さなモデルをお試しください。';
        } else if (err.message.includes('memory') || err.message.includes('out of memory')) {
          msg += 'メモリ不足です。他のタブを閉じるか、デバイスの空きメモリを増やしてください。';
        } else {
          msg += err.message;
        }
        showError(msg);
        setStatus('❌ モデルの読み込みに失敗しました');
      } finally {
        loading = false;
      }
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'message ' + (role === 'あなた' ? 'user' : 'bot');
      div.textContent = (role === 'あなた' ? '🧑 ' : '🤖 ') + text;
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function addThinkingMessage() {
      const div = document.createElement('div');
      div.className = 'message bot thinking';
      div.id = 'thinking-msg';
      div.textContent = '🤖 考え中...';
      chatDiv.appendChild(div);
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function removeThinkingMessage() {
      const el = document.getElementById('thinking-msg');
      if (el) el.remove();
    }

    async function sendMessage() {
  const prompt = promptInput.value.trim();
  if (!prompt || !generator) return;

  addMessage('あなた', prompt);
  promptInput.value = '';
  sendBtn.disabled = true;
  promptInput.disabled = true;
  addThinkingMessage();
  hideError();

  try {
    // ★ 修正点1：入力を配列で渡す
    const messages = [{ role: "user", content: prompt }];
    const result = await generator(messages, {
      max_new_tokens: 256,
      temperature: 0.6,
      do_sample: true,
    });

    console.log('生成結果:', result);

    removeThinkingMessage();

    // ★ 修正点2：出力から最後のメッセージを取り出す
    let reply = '';
    if (Array.isArray(result) && result.length > 0) {
      // 通常、生成結果は会話全体の配列で、最後に assistant が追加される
      const last = result[result.length - 1];
      if (typeof last === 'string') {
        reply = last;
      } else if (last && typeof last === 'object') {
        // content プロパティがあればそれを、なければ generated_text を参照
        reply = last.content || last.generated_text || JSON.stringify(last);
      } else {
        reply = String(last);
      }
    } else if (result && typeof result === 'object' && result.generated_text) {
      // もし単一オブジェクトが返った場合
      reply = result.generated_text;
    } else {
      throw new Error('予期しない出力形式: ' + JSON.stringify(result));
    }

    reply = reply.trim();
    if (!reply) reply = '(応答が空でした)';
    addMessage('🤖', reply);

  } catch (err) {
    removeThinkingMessage();
    console.error(err);
    let msg = 'テキスト生成中にエラーが発生しました。\n';
    if (err.message.includes('split is not a function')) {
      msg += 'モデルへの入力形式が正しくありません。会話形式の配列を渡す必要があります。';
    } else if (err.message.includes('memory')) {
      msg += 'メモリが不足しています。他のタブを閉じて再試行してください。';
    } else {
      msg += err.message;
    }
    showError(msg);
    addMessage('🤖', '⚠️ エラー: ' + msg);
  } finally {
    sendBtn.disabled = false;
    promptInput.disabled = false;
    promptInput.focus();
  }
}

    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    loadModel();
  </script>
</body>
</html>
