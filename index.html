<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Faraway AI - Phenex</title>

<style>

:root{
    --bg:#030712;
    --panel:#081321;
    --panel2:#10253f;

    --blue:#4da3ff;
    --cyan:#78e7ff;

    --text:#eef9ff;
    --sub:#9fb6d3;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    background:
    radial-gradient(circle at top,
    rgba(77,163,255,.15),
    transparent 40%),
    linear-gradient(
    180deg,
    #081321 0%,
    #04070f 60%,
    #000 100%);
    
    color:var(--text);
    font-family:"Segoe UI",sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
}

.app{
    width:100%;
    max-width:700px;
    height:100vh;

    display:flex;
    flex-direction:column;
}

.header{
    padding:20px;

    border-bottom:1px solid rgba(120,231,255,.15);

    backdrop-filter:blur(10px);
}

.logo{
    font-size:28px;
    font-weight:700;
    letter-spacing:2px;
}

.version{
    color:var(--sub);
    font-size:12px;
    margin-top:4px;
}

.status{
    margin-top:10px;

    display:flex;
    align-items:center;
    gap:8px;

    color:var(--cyan);
    font-size:13px;
}

.dot{
    width:8px;
    height:8px;

    border-radius:50%;

    background:var(--cyan);

    box-shadow:
    0 0 10px var(--cyan),
    0 0 20px var(--cyan);

    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        opacity:.3;
    }
}

.chat{
    flex:1;
    overflow:auto;

    padding:20px;

    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    max-width:85%;
    padding:14px 18px;

    border-radius:18px;

    line-height:1.6;
}

.ai{
    background:
    linear-gradient(
    135deg,
    rgba(77,163,255,.15),
    rgba(120,231,255,.08));

    border:1px solid rgba(77,163,255,.2);

    align-self:flex-start;
}

.user{
    background:
    linear-gradient(
    135deg,
    rgba(77,163,255,.4),
    rgba(77,163,255,.2));

    align-self:flex-end;
}

.input-area{
    padding:15px;

    display:flex;
    gap:10px;

    border-top:
    1px solid rgba(120,231,255,.1);
}

input{
    flex:1;

    padding:14px;

    border:none;
    outline:none;

    color:white;

    background:var(--panel);

    border-radius:14px;
}

button{
    width:60px;

    border:none;

    border-radius:14px;

    color:white;

    cursor:pointer;

    background:
    linear-gradient(
    135deg,
    var(--blue),
    var(--cyan));

    box-shadow:
    0 0 10px rgba(77,163,255,.4),
    0 0 30px rgba(77,163,255,.15);
}

button:hover{
    transform:translateY(-2px);
}

.boot{
    color:var(--cyan);
    font-size:13px;
    opacity:.8;
}

</style>
</head>
<body>

<div class="app">

    <div class="header">
        <div class="logo">FARAWAY</div>

        <div class="version">
            Phenex v0.1
        </div>

        <div class="status">
            <div class="dot"></div>
            ONLINE
        </div>
    </div>

    <div class="chat">

        <div class="boot">
            Initializing Faraway AI...
        </div>

        <div class="message ai">
            ようこそ。
            Faraway AI Phenexへ接続しました。
        </div>

        <div class="message user">
            調子はどう？
        </div>

        <div class="message ai">
            全システム正常。
            遠隔通信リンクを維持しています。
        </div>

    </div>

    <div class="input-area">
        <input
        type="text"
        placeholder="Message Faraway..."
        >
        <button>➤</button>
    </div>

</div>

</body>
</html>
