<!DOCTYPE html>
<html>
<head>
    <title>ブラウザで動くチャットボット (Transformers.js)</title>
</head>
<body>
    <h2>ブラウザで動くチャットボット</h2>
    <textarea id="output" rows="10" cols="50" readonly></textarea><br/>
    <input type="text" id="input" size="40">
    <button onclick="generate()">送信</button>

    <script type="importmap">
        {
            "imports": {
                "@huggingface/transformers": "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0/src/transformers.js"
            }
        }
    </script>
    <script type="module">
        import { pipeline } from '@huggingface/transformers';

        const output = document.getElementById('output');
        // モデルは初回アクセス時にダウンロードされます (約200-300MB)
        // より大きなモデルを使いたい場合は、'HuggingFaceTB/SmolLM2-360M-Instruct' などに変更可能です[reference:11]
        const generator = await pipeline('text-generation', 'HuggingFaceTB/SmolLM2-135M-Instruct', { device: 'webgpu' });
        output.value = 'モデルの準備ができました！\n';

        window.generate = async function() {
            const inputText = document.getElementById('input').value;
            if (!inputText) return;
            output.value += `\n> You: ${inputText}`;
            document.getElementById('input').value = '';

            // テキストを生成
            const result = await generator(inputText, { max_new_tokens: 100 });
            const answer = result[0].generated_text;
            output.value += `\n🤖 Bot: ${answer.replace(inputText, '')}\n`;
        };
    </script>
</body>
</html>
