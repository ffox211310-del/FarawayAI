<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Faraway AI</title>

<style>

:root{
--bg:#020611;
--panel:#081321;
--panel2:#10253f;

--blue:#4da3ff;
--cyan:#78e7ff;

--text:#eef9ff;
--sub:#89a8c9;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
height:100vh;
overflow:hidden;

background:
radial-gradient(
circle at top,
rgba(77,163,255,.12),
transparent 35%),

linear-gradient(
180deg,
#081321 0%,
#04070f 55%,
#000 100%
);

color:white;
}

/* 星 */

.stars{
position:fixed;
inset:0;
pointer-events:none;
}

.stars::before{
content:"";
position:absolute;
inset:0;

background-image:
radial-gradient(circle,#fff 1px,transparent 1px),
radial-gradient(circle,#78e7ff 1px,transparent 1px);

background-size:
180px 180px,
260px 260px;

background-position:
0 0,
80px 140px;

opacity:.3;
}

/* アプリ全体 */

.app{
height:100vh;
display:flex;
flex-direction:column;
}

/* ヘッダー */

.header{

padding:18px;

border-bottom:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(8px);
}

.logo{

font-size:30px;
font-weight:900;
letter-spacing:4px;

background:
linear-gradient(
90deg,
#4da3ff,
#78e7ff,
#ffffff
);

-webkit-background-clip:text;
background-clip:text;
color:transparent;
}

.ship-status{

margin-top:8px;

font-size:13px;
color:var(--cyan);

display:flex;
align-items:center;
gap:8px;
}

.dot{

width:8px;
height:8px;

border-radius:50%;

background:var(--cyan);

box-shadow:
0 0 8px var(--cyan),
0 0 18px var(--cyan);

animation:pulse 2s infinite;
}

@keyframes pulse{

50%{
opacity:.3;
}

}

/* チャット */

.chat{

flex:1;

overflow-y:auto;

padding:20px;

display:flex;
flex-direction:column;

gap:14px;
}

.system{

text-align:center;

font-size:12px;

color:var(--sub);

margin:6px 0 14px;
}

.msg{

max-width:85%;

padding:14px 16px;

line-height:1.6;

border-radius:18px;

word-break:break-word;
}

.ai{

align-self:flex-start;

background:
rgba(255,255,255,.05);

border:
1px solid rgba(77,163,255,.15);

backdrop-filter:blur(10px);
}

.user{

align-self:flex-end;

background:
linear-gradient(
135deg,
rgba(77,163,255,.65),
rgba(77,163,255,.25)
);
}

/* 入力欄 */

.input-area{

padding:14px;

display:flex;

gap:10px;

border-top:
1px solid rgba(255,255,255,.08);

background:
rgba(0,0,0,.15);

backdrop-filter:blur(12px);
}

.input-box{

flex:1;

padding:14px;

border:none;
outline:none;

border-radius:14px;

background:var(--panel);

color:white;

font-size:15px;
}

.send-btn{

width:58px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:18px;

color:white;

background:
linear-gradient(
135deg,
var(--blue),
var(--cyan)
);

box-shadow:
0 0 15px rgba(77,163,255,.25);
}

.send-btn:active{
transform:scale(.96);
}

</style>
</head>
<body>

<div class="stars"></div>

<div class="app">

<div class="header">

<div class="logo">
FARAWAY
</div>

<div class="ship-status">

<div class="dot"></div>

通信船停泊中

</div>

</div>

<div class="chat">

<div class="system">
通信船が停泊しています
</div>

<div class="msg ai">
こんにちは。

Farawayです。

遠くから来ました。
</div>

<div class="msg ai">
たとえ砂漠の真ん中でも、
宇宙の果てでも、

スマホが動く限り、
あなたのそばにいます。
</div>

<div class="msg user">
よろしく！
</div>

<div class="msg ai">
こちらこそ。

準備ができたら、
いつでも話しかけてください。
</div>

</div>

<div class="input-area">

<input
class="input-box"
type="text"
placeholder="Farawayへメッセージを送信..."
>

<button class="send-btn">
➤
</button>

</div>

</div>

</body>
</html>
