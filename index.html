<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Faraway AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:
radial-gradient(circle at top,#10213d 0%,#050914 40%,#000 100%);
color:white;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* 星 */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:.5;
animation:twinkle 4s infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{
opacity:.2;
}
50%{
opacity:.9;
}
}

.container{
width:90%;
max-width:500px;
text-align:center;
z-index:2;
}

.logo{
font-size:4rem;
font-weight:900;
letter-spacing:5px;

background:linear-gradient(
90deg,
#7dd3ff,
#4da3ff,
#8ae7ff,
#7dd3ff
);

background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:shine 8s linear infinite;
}

@keyframes shine{
0%{
background-position:0%;
}
100%{
background-position:300%;
}
}

.subtitle{
margin-top:15px;
font-size:1rem;
color:#9ec9ff;
line-height:1.8;
}

.message{
margin-top:40px;
padding:20px;
background:rgba(20,40,80,.25);
backdrop-filter:blur(10px);
border:1px solid rgba(100,180,255,.15);
border-radius:18px;
}

.status{
font-size:1.1rem;
color:#8fd8ff;
margin-bottom:12px;
}

.desc{
font-size:.95rem;
color:#d6e8ff;
line-height:1.7;
}

.button{
margin-top:35px;
padding:15px 35px;
border:none;
border-radius:999px;

background:
linear-gradient(
90deg,
#2c6fff,
#54d7ff
);

color:white;
font-weight:700;
font-size:1rem;
cursor:pointer;

box-shadow:
0 0 25px rgba(80,180,255,.3);
}

.button:hover{
transform:translateY(-2px);
}
</style>
</head>
<body>

<div id="stars"></div>

<div class="container">

<div class="logo">FARAWAY</div>

<div class="subtitle">
たとえ砂漠の真ん中でも。<br>
宇宙の果てでも。<br>
スマホが動く限り、あなたのそばに。
</div>

<div class="message">

<div class="status">
📡 Farawayに連絡中...
</div>

<div class="desc">
遠い場所にいるAIへ接続しています。<br>
準備が整うと、あなたの端末へやってきます。
</div>

</div>

<button class="button">
迎え入れる
</button>

</div>

<script>

const stars = document.getElementById("stars");

for(let i=0;i<70;i++){

const star=document.createElement("div");

star.className="star";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

star.style.animationDelay=
(Math.random()*4)+"s";

star.style.opacity=
Math.random();

stars.appendChild(star);
}

</script>

</body>
</html>
