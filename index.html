<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Faraway</title>

<style>

:root{
--bg:#020611;
--panel:#081321;
--blue:#4da3ff;
--cyan:#78e7ff;
--text:#eef9ff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:sans-serif;
color:var(--text);

/* 宇宙背景 */
background:
radial-gradient(circle at top,
rgba(77,163,255,.12),
transparent 35%),

linear-gradient(
180deg,
#081321 0%,
#050814 50%,
#000 100%
);

position:relative;
}

/* 星 */
.stars{
position:fixed;
inset:0;
pointer-events:none;
}

.stars::before,
.stars::after{
content:"";
position:absolute;
inset:0;
background-image:

radial-gradient(circle,#fff 1px,transparent 1px),
radial-gradient(circle,#78e7ff 1px,transparent 1px),
radial-gradient(circle,#4da3ff 1px,transparent 1px);

background-size:
180px 180px,
250px 250px,
320px 320px;

background-position:
0 0,
70px 120px,
140px 80px;

opacity:.35;
}

.stars::after{
filter:blur(.8px);
opacity:.15;
}

/* ヘッダー */
.header{
padding:24px;
border-bottom:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(8px);
}

/* FARAWAYロゴ */
.logo{

font-size:38px;
font-weight:900;
letter-spacing:4px;

background:
linear-gradient(
90deg,
#4da3ff,
#78e7ff,
#dff7ff
);

-webkit-background-clip:text;
background-clip:text;

color:transparent;

text-shadow:
0 0 15px rgba(77,163,255,.3);

}

/* バージョン */
.version{
margin-top:6px;
font-size:13px;
color:#8ca9c9;
letter-spacing:2px;
}

.status{
margin-top:12px;
display:flex;
align-items:center;
gap:8px;
font-size:13px;
color:var(--cyan);
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:var(--cyan);

box-shadow:
0 0 10px var(--cyan),
0 0 20px var(--cyan);

animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
opacity:.3;
}
}

.chat{
padding:20px;
}

.msg{
padding:14px 18px;
margin-bottom:14px;
border-radius:18px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(77,163,255,.15);

backdrop-filter:blur(10px);

max-width:80%;
}

</style>
</head>
<body>

<div class="stars"></div>

<div class="header">

<div class="logo">
FARAWAY
</div>

<div class="version">
PHENEX v0.1
</div>

<div class="status">
<div class="dot"></div>
ONLINE
</div>

</div>

<div class="chat">

<div class="msg">
ようこそ。Farawayへ接続しました。
</div>

<div class="msg">
ここにAIの返答が表示されます。
</div>

</div>

</body>
</html>
